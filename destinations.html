<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lebanon travel destinations page.">
  <title>Lebanon Weather & Travel Explorer | Destinations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <button class="sidebar-toggle" type="button" aria-controls="siteSidebar" aria-expanded="false" aria-label="Open sidebar menu" data-sidebar-toggle>
    <span class="sidebar-toggle-lines" aria-hidden="true"></span>
  </button>

  <div class="sidebar-overlay" data-sidebar-overlay></div>

  <aside class="site-sidebar" id="siteSidebar" aria-label="Sidebar navigation" data-sidebar>
    <a class="sidebar-title" href="index.html">Lebanon Explorer</a>
    <nav class="sidebar-nav" aria-label="Sidebar menu">
      <a class="sidebar-link" href="index.html">Home</a>
      <a class="sidebar-link active" aria-current="page" href="destinations.html">Destinations</a>
      <a class="sidebar-link" href="weather.html">Weather</a>
      <a class="sidebar-link" href="about.html">About</a>
    </nav>
  </aside>

  <main>
    <section class="page-section">
      <div class="container">
        <p class="section-label">Travel Guide</p>
        <h1>Destinations in Lebanon</h1>
        <p class="lead">Browse curated Lebanese travel destinations by name, category, and region.</p>

        <div class="destination-controls" aria-label="Destination filters">
          <div class="filter-field">
            <label class="form-label" for="destinationSearch">Search destinations</label>
            <input class="form-control" type="search" id="destinationSearch" placeholder="Search by name, city, tag, or season">
          </div>
          <div class="filter-field">
            <label class="form-label" for="categoryFilter">Category</label>
            <select class="form-select" id="categoryFilter">
              <option value="">All categories</option>
            </select>
          </div>
          <div class="filter-field">
            <label class="form-label" for="regionFilter">Region</label>
            <select class="form-select" id="regionFilter">
              <option value="">All regions</option>
            </select>
          </div>
          <button class="btn btn-outline-success reset-filters-button" type="button" id="resetDestinationFilters">Reset filters</button>
        </div>

        <div class="destination-results-summary">
          <p class="mb-0" id="destinationResultCount">0 destinations found</p>
        </div>

        <div class="destination-grid" id="destinationGrid" aria-live="polite"></div>

        <div class="destination-empty-state" id="destinationEmptyState" hidden>
          <h2 class="h5">No destinations found</h2>
          <p class="mb-0">Try a different search term, category, or region.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="mb-0">&copy; 2026 Charbel Chehade</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script type="module" src="assets/js/destinations.js"></script>
</body>
</html>
